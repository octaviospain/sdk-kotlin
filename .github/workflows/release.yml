# Manual release: derives the next version with axion-release from the chosen increment,
# builds and tests, then creates and pushes the git tag. Artifact publishing is not wired
# yet — this stops after tagging.
name: Release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'Version increment strategy'
        required: true
        default: 'incrementMinor'
        type: choice
        options:
          - incrementPatch
          - incrementMinor
          - incrementMajor

permissions:
  contents: write

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build and test
        run: ./gradlew build -PversionIncrement=${{ inputs.versionIncrement }}
      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew createRelease -PversionIncrement=${{ inputs.versionIncrement }}
          git push --follow-tags origin HEAD
