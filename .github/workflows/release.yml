# Manual release: derives the next version with axion-release from the chosen increment,
# builds and tests, creates and pushes the git tag, then publishes the full signed KMP
# artifact matrix to Maven Central and cuts a GitHub release with the SBOM attached.
#
# The job runs on macos-latest because Kotlin/Native Apple targets can only be built there.
# A single macOS runner builds the entire matrix (JVM + JS + Wasm + all Apple + both Linux +
# mingw), so the complete signed matrix lands in one Central Portal deployment. A Linux runner
# would silently omit the Apple targets.
name: Release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'Version increment strategy'
        required: true
        default: 'incrementMinor'
        type: choice
        options:
          - incrementPatch
          - incrementMinor
          - incrementMajor

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build and test
        run: ./gradlew build -PversionIncrement=${{ inputs.versionIncrement }}
      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew createRelease -PversionIncrement=${{ inputs.versionIncrement }}
          git push --follow-tags origin HEAD
      - name: Publish signed artifact matrix to Maven Central
        env:
          # Central Portal user-token credentials and the in-memory GPG key are injected as
          # ORG_GRADLE_PROJECT_* so the vanniktech plugin picks them up as Gradle properties.
          # They are supplied only by CI secrets and never committed. The tag was pushed in the
          # previous step, so axion-release now resolves the released (non-SNAPSHOT) version,
          # which is what gets signed and uploaded.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        # mavenCentralDeploymentValidation=PUBLISHED makes the task block until the deployment
        # is fully published and downloadable, not just VALIDATED (the plugin default). This
        # guarantees the artifacts are available before the next step announces the GitHub release.
        run: ./gradlew publishAndReleaseToMavenCentral -PmavenCentralDeploymentValidation=PUBLISHED --no-configuration-cache
      - name: Generate SBOM and publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Regenerate the CycloneDX SBOM now that the release tag exists so it carries the
          # release version, then create the GitHub release and attach it for downstream
          # consumers and security tooling.
          ./gradlew :cloudevents-kotlin-core:cyclonedxDirectBom
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            core/build/reports/cyclonedx/bom.cdx.json
