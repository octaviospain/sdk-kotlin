# Manual release: derives the next version with axion-release from the chosen increment,
# builds and tests, creates and pushes the git tag, publishes the full signed KMP artifact
# matrix to Maven Central, cuts a GitHub release (git-cliff notes + SBOM), and commits the
# regenerated CHANGELOG.md back to the default branch.
#
# The job runs on macos-latest because Kotlin/Native Apple targets can only be built there.
# A single macOS runner builds the entire matrix (JVM + JS + Wasm + all Apple + both Linux +
# mingw), so the complete signed matrix lands in one Central Portal deployment. A Linux runner
# would silently omit the Apple targets.
name: Release

on:
  workflow_dispatch:
    inputs:
      versionIncrement:
        description: 'Version increment strategy'
        required: true
        default: 'incrementMinor'
        type: choice
        options:
          - incrementPatch
          - incrementMinor
          - incrementMajor

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build and test
        run: ./gradlew build -PversionIncrement=${{ inputs.versionIncrement }}
      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew createRelease -PversionIncrement=${{ inputs.versionIncrement }}
          git push --follow-tags origin HEAD
      - name: Publish signed artifact matrix to Maven Central
        env:
          # Central Portal user-token credentials and the in-memory GPG key are injected as
          # ORG_GRADLE_PROJECT_* so the vanniktech plugin picks them up as Gradle properties.
          # They are supplied only by CI secrets and never committed. The tag was pushed in the
          # previous step, so axion-release now resolves the released (non-SNAPSHOT) version,
          # which is what gets signed and uploaded.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        # mavenCentralDeploymentValidation=PUBLISHED makes the task block until the deployment
        # is fully published and downloadable, not just VALIDATED (the plugin default). This
        # guarantees the artifacts are available before the next step announces the GitHub release.
        run: ./gradlew publishAndReleaseToMavenCentral -PmavenCentralDeploymentValidation=PUBLISHED --no-configuration-cache
      - name: Generate SBOM
        # Regenerate the CycloneDX SBOM now that the release tag exists so it carries the
        # release version. This runs before any changelog file is written, so the working tree
        # is still clean and axion-release resolves the exact released (non-SNAPSHOT) version.
        run: ./gradlew :cloudevents-kotlin-core:cyclonedxDirectBom
      - name: Generate release notes
        # git-cliff turns the Conventional Commits of the tag created above into the release
        # body. --latest selects only that tag's section; the tag is already in the checkout.
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            core/build/reports/cyclonedx/bom.cdx.json
      - name: Regenerate CHANGELOG.md
        # The cumulative changelog covering every release, written to the repository root.
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
      - name: Commit and push the changelog
        env:
          # Route the branch name through an env var rather than interpolating it into the shell,
          # so a crafted ref cannot inject code into the run step.
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          # git-cliff only writes the file; commit the regenerated changelog back to the default
          # branch as a follow-up to the release tag (the tag itself points at the release commit).
          # CHANGELOG.md matches **/*.md in build.yml's paths-ignore so this push does not retrigger
          # CI, and chore(release) is excluded from future changelogs by cliff.toml.
          # git status --porcelain (not git diff) so a brand-new untracked CHANGELOG.md — the state
          # on the very first release — is detected and committed, not silently skipped.
          if [[ -n "$(git status --porcelain -- CHANGELOG.md)" ]]; then
            git add CHANGELOG.md
            git commit --signoff -m "chore(release): update CHANGELOG for $(git describe --tags --abbrev=0)"
            git push origin "HEAD:$RELEASE_REF"
          fi
