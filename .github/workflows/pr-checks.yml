# Commit-message and PR-title linting. Kept separate from the build matrix so that PR
# title/body edits (the `edited` trigger) re-run this cheap check without firing the full
# multi-OS build. Build, test, detekt, and Spotless run in build.yml; DCO sign-off is
# enforced by the DCO GitHub App.
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  commitlint:
    name: Lint commits and PR title
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs
