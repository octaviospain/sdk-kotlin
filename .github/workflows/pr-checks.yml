# Lightweight pull-request checks: commit-message convention, code-quality gates
# (Spotless formatting, a commonMain platform-purity grep), and a full project build
# (which also runs detekt and the tests via `check`).
#
# DCO sign-off is enforced separately by the DCO GitHub App (a repository setting),
# not by a workflow step. The full multi-OS native test matrix is handled by a
# separate workflow.
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  commitlint:
    name: Lint commits and PR title
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs

  quality:
    name: Quality gates and build
    runs-on: ubuntu-latest
    # `edited` fires on PR title/body edits and only needs the commitlint job re-run;
    # skip the heavier build here to avoid rebuilding on every metadata edit.
    if: github.event.action != 'edited'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Spotless (formatting and license header)
        run: ./gradlew spotlessCheck
      - name: Check commonMain platform purity
        run: |
          # Fail on any JVM-only import in shared source. Uses the module's commonMain
          # tree; the ^import anchor ignores commented-out lines. Empty/absent tree means
          # there is nothing to violate yet — the gate becomes load-bearing as soon as
          # commonMain source lands.
          violations=$(grep -rnE "^import (java|javax|kotlin\.jvm)\." core/src/commonMain/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "ERROR: JVM-only imports are not allowed in commonMain:"
            echo "$violations"
            exit 1
          fi
          echo "commonMain purity check passed (no JVM-only imports in shared source)"
      - name: Build, analyze, and test
        # `build` runs assemble + check, which includes detekt across every source set
        # and the TestBalloon suites on all ubuntu-runnable targets.
        run: ./gradlew build
